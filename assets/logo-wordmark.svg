<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 280 320" fill="none">
  <title>social2scale Logo — Faceted Peak (Emerald + voller Halo)</title>
  <defs>
    <!-- Voll-Halo hinter Pyramide (Emerald) -->
    <radialGradient id="sunDiskA2" cx="50%" cy="50%" r="50%">
      <stop offset="0%"  stop-color="#28C281" stop-opacity="0.95"/>
      <stop offset="40%" stop-color="#1FC998" stop-opacity="0.75"/>
      <stop offset="70%" stop-color="#00B888" stop-opacity="0.45"/>
      <stop offset="92%" stop-color="#00B888" stop-opacity="0.18"/>
      <stop offset="100%" stop-color="transparent"/>
    </radialGradient>
    <!-- Two-Tone-Facets der Pyramide -->
    <linearGradient id="pyrLightA2" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%"  stop-color="#1FC998"/>
      <stop offset="100%" stop-color="#00B888"/>
    </linearGradient>
    <linearGradient id="pyrDarkA2" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%"  stop-color="#0B0F14"/>
      <stop offset="100%" stop-color="#03080D"/>
    </linearGradient>
    <!-- Wordmark-Gradient -->
    <linearGradient id="wordmarkA2" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%"  stop-color="#00B888"/>
      <stop offset="50%" stop-color="#1FC998"/>
      <stop offset="100%" stop-color="#28C281"/>
    </linearGradient>
    <!-- Subtle Glow um Pyramide -->
    <filter id="pyrGlowA2" x="-15%" y="-15%" width="130%" height="130%">
      <feGaussianBlur stdDeviation="1.4" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <!-- Soft Ground Shadow -->
    <radialGradient id="groundShadowA2" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#000" stop-opacity="0.45"/>
      <stop offset="100%" stop-color="transparent"/>
    </radialGradient>
  </defs>

  <!-- Voll-Halo (prominenter, hinter Pyramide) -->
  <circle cx="140" cy="135" r="105" fill="url(#sunDiskA2)"/>

  <!-- Soft Ground-Shadow unter Pyramide -->
  <ellipse cx="140" cy="232" rx="65" ry="6" fill="url(#groundShadowA2)"/>

  <!-- 3-Facet Pyramide (Two-Tone, Iso-Projection) -->
  <g filter="url(#pyrGlowA2)">
    <!-- Right Face (dark, depth) -->
    <path d="M 140 60 L 196 222 L 140 222 Z" fill="url(#pyrDarkA2)"/>
    <!-- Left Face (light, emerald-side) -->
    <path d="M 140 60 L 84 222 L 140 222 Z" fill="url(#pyrLightA2)"/>
    <!-- Center Spine Highlight -->
    <line x1="140" y1="60" x2="140" y2="222" stroke="#1FC998" stroke-width="1.5" stroke-opacity="0.85" stroke-linecap="round"/>
  </g>

  <!-- Wordmark "social2scale" -->
  <text x="140" y="278" text-anchor="middle"
        font-family="'Space Grotesk', system-ui, sans-serif"
        font-size="30" font-weight="700" fill="url(#wordmarkA2)" letter-spacing="1">social2scale</text>

  <!-- Sub-Tagline -->
  <text x="140" y="302" text-anchor="middle"
        font-family="'Space Grotesk', system-ui, sans-serif"
        font-size="11" font-weight="500" fill="#00B888" letter-spacing="6" opacity="0.7">SOCIAL, DAS SKALIERT.</text>
</svg>
