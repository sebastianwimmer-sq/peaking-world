<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" fill="none">
  <title>social2scale — Social, das skaliert. (Emerald Mark, 64×64)</title>
  <defs>
    <radialGradient id="sunDisk" cx="50%" cy="50%" r="50%">
      <stop offset="0%"  stop-color="#28C281" stop-opacity="0.95"/>
      <stop offset="40%" stop-color="#1FC998" stop-opacity="0.8"/>
      <stop offset="70%" stop-color="#00B888" stop-opacity="0.5"/>
      <stop offset="92%" stop-color="#00B888" stop-opacity="0.2"/>
      <stop offset="100%" stop-color="transparent"/>
    </radialGradient>
    <linearGradient id="pyrLight" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%"  stop-color="#1FC998"/>
      <stop offset="100%" stop-color="#00B888"/>
    </linearGradient>
    <linearGradient id="pyrDark" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%"  stop-color="#0B0F14"/>
      <stop offset="100%" stop-color="#03080D"/>
    </linearGradient>
    <filter id="pyrGlow" x="-15%" y="-15%" width="130%" height="130%">
      <feGaussianBlur stdDeviation="0.4" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>
  <!-- Sun-Disk -->
  <circle cx="32" cy="34" r="26" fill="url(#sunDisk)"/>
  <!-- Two-Tone Faceted Pyramide -->
  <g filter="url(#pyrGlow)">
    <path d="M 32 8 L 56 56 L 32 56 Z" fill="url(#pyrDark)"/>
    <path d="M 32 8 L 8 56 L 32 56 Z" fill="url(#pyrLight)"/>
    <line x1="32" y1="8" x2="32" y2="56" stroke="#1FC998" stroke-width="0.6" stroke-opacity="0.85" stroke-linecap="round"/>
  </g>
</svg>
