<!doctype html><html><head><meta charset="utf-8"><link rel="stylesheet" href="_card.css"></head><body>
<div class="row" style="gap:8px">
  <div class="swatch" style="background:#10b981;flex:1;color:#0f172a"><div class="name">Success</div><div class="hex">#10b981 / #34d399</div></div>
  <div class="swatch" style="background:#f59e0b;flex:1;color:#0f172a"><div class="name">Warning ⚠️</div><div class="hex">#f59e0b / #fbbf24</div></div>
  <div class="swatch" style="background:#ef4444;flex:1;color:#0f172a"><div class="name">Danger</div><div class="hex">#ef4444 / #f87171</div></div>
  <div class="swatch" style="background:#34d399;flex:1;color:#0f172a"><div class="name">Trend Up ↗</div><div class="hex">#34d399</div></div>
  <div class="swatch" style="background:#f87171;flex:1;color:#0f172a"><div class="name">Trend Down ↘</div><div class="hex">#f87171</div></div>
</div>
<div style="margin-top:8px;font-size:10px;color:#64748b">⚠️ Warning ≈ Sunrise Orange — in brand contexts always use #FFA94D, not #f59e0b.</div>
</body></html>
