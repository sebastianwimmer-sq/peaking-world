<!doctype html><html><head><meta charset="utf-8"><link rel="stylesheet" href="_card.css"></head><body>
<div style="display:flex;flex-direction:column;gap:14px">
  <div style="display:flex;gap:8px;flex-wrap:wrap">
    <span style="padding:4px 12px;border-radius:999px;font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:0.05em;color:#FFA94D;background:rgba(255,169,77,0.15);border:1px solid rgba(255,169,77,0.3)">🌅 Connect</span>
    <span style="padding:4px 12px;border-radius:999px;font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:0.05em;color:#FFA94D;background:rgba(255,169,77,0.15);border:1px solid rgba(255,169,77,0.3)">📊 Build in Public</span>
    <span style="padding:4px 12px;border-radius:999px;font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:0.05em;color:#FFA94D;background:rgba(255,169,77,0.15);border:1px solid rgba(255,169,77,0.3)">⛰️ Tool · Live</span>
  </div>
  <div style="display:flex;gap:6px;flex-wrap:wrap">
    <span style="padding:5px 12px;border-radius:999px;font-size:12px;font-weight:700;background:linear-gradient(135deg,#FFA94D,#FF6B6B);color:#0f172a;box-shadow:0 6px 20px rgba(255,169,77,0.35)">All</span>
    <span style="padding:5px 12px;border-radius:999px;font-size:12px;background:transparent;border:1px solid rgba(255,255,255,0.15);color:#cbd5e1">Outdoor</span>
    <span style="padding:5px 12px;border-radius:999px;font-size:12px;background:transparent;border:1px solid rgba(255,255,255,0.15);color:#cbd5e1">Gym</span>
    <span style="padding:5px 12px;border-radius:999px;font-size:12px;background:transparent;border:1px solid rgba(255,255,255,0.15);color:#cbd5e1">Mindset</span>
  </div>
  <div style="display:flex;gap:6px;flex-wrap:wrap;align-items:center">
    <span style="padding:3px 10px;border-radius:999px;font-size:11px;background:rgba(16,185,129,0.18);color:#34d399;border:1px solid rgba(16,185,129,0.35)">✅ Posted</span>
    <span style="padding:3px 10px;border-radius:999px;font-size:11px;background:rgba(245,158,11,0.18);color:#fbbf24;border:1px solid rgba(245,158,11,0.35)">⏳ Planned</span>
    <span style="padding:3px 10px;border-radius:999px;font-size:11px;background:rgba(239,68,68,0.18);color:#f87171;border:1px solid rgba(239,68,68,0.35)">✕ Skipped</span>
    <span style="padding:3px 10px;border-radius:999px;font-size:11px;background:rgba(16,185,129,0.18);color:#34d399">🏔️ Outdoor</span>
    <span style="padding:3px 10px;border-radius:999px;font-size:11px;background:rgba(245,158,11,0.18);color:#fbbf24">💪 Gym</span>
    <span style="padding:3px 10px;border-radius:999px;font-size:11px;background:rgba(139,92,246,0.18);color:#a78bfa">🧠 Mindset</span>
  </div>
</div>
</body></html>
