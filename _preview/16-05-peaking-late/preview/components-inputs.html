<!doctype html><html><head><meta charset="utf-8"><link rel="stylesheet" href="_card.css"></head><body>
<style>
  .pinput{background:rgba(15,23,42,0.6);border:1px solid rgba(255,255,255,0.15);color:#fff;padding:12px 14px;border-radius:12px;font-size:14px;width:100%;box-sizing:border-box;font-family:inherit}
  .pinput:focus{outline:none;border-color:#FFA94D}
  .lbl{font-size:12px;color:#94a3b8;margin-bottom:6px;display:block}
</style>
<div style="display:grid;grid-template-columns:1fr 1fr;gap:12px">
  <div><label class="lbl">Reel-Titel/Hook</label><input class="pinput" placeholder='z.B. "She left."'/></div>
  <div><label class="lbl">Datum</label><input class="pinput" type="date" value="2026-05-10"/></div>
  <div><label class="lbl">Content-Säule</label><select class="pinput"><option>🏔️ Outdoor (40%)</option></select></div>
  <div><label class="lbl">Passwort</label><input class="pinput" type="password" placeholder="••••••••" style="border-color:#FFA94D"/></div>
  <div style="grid-column:span 2"><input class="pinput" placeholder="🔍 Modul suchen…"/></div>
</div>
</body></html>
