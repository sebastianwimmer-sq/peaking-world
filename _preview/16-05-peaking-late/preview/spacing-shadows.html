<!doctype html><html><head><meta charset="utf-8"><link rel="stylesheet" href="_card.css"></head><body>
<div class="eyebrow" style="margin-bottom:8px">Neutral elevation</div>
<div class="row" style="gap:14px">
  <div style="flex:1;height:60px;border-radius:14px;background:#1e293b;box-shadow:0 2px 6px rgba(0,0,0,0.2);display:flex;align-items:center;padding:0 12px;font-size:11px">sm · menu hover</div>
  <div style="flex:1;height:60px;border-radius:14px;background:#1e293b;box-shadow:0 8px 20px rgba(0,0,0,0.25);display:flex;align-items:center;padding:0 12px;font-size:11px">md · buttons</div>
  <div style="flex:1;height:60px;border-radius:14px;background:#1e293b;box-shadow:0 18px 36px rgba(0,0,0,0.35);display:flex;align-items:center;padding:0 12px;font-size:11px">lg · cards lifted</div>
</div>
<div class="eyebrow" style="margin:14px 0 8px">Sunrise glow (branded surfaces only)</div>
<div class="row" style="gap:14px">
  <div style="flex:1;height:60px;border-radius:14px;background:#1e293b;box-shadow:0 0 24px rgba(255,169,77,0.18);display:flex;align-items:center;padding:0 12px;font-size:11px">soft glow · idle hero</div>
  <div style="flex:1;height:60px;border-radius:14px;background:linear-gradient(135deg,#FFA94D,#FF6B6B);color:#0f172a;box-shadow:0 8px 24px rgba(255,169,77,0.35);display:flex;align-items:center;padding:0 12px;font-size:11px;font-weight:700">btn-glow · 0.35α</div>
  <div style="flex:1;height:60px;border-radius:14px;background:linear-gradient(135deg,#FFA94D,#FF6B6B);color:#0f172a;box-shadow:0 12px 36px rgba(255,169,77,0.55);display:flex;align-items:center;padding:0 12px;font-size:11px;font-weight:700">btn-glow-strong · 0.55α</div>
</div>
</body></html>
