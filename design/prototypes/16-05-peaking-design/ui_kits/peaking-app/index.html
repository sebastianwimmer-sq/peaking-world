<!doctype html>
<html lang="de">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>PEAKING · UI Kit</title>
<link rel="icon" href="../../assets/logo.svg">
<link rel="stylesheet" href="../../colors_and_type.css">
<link rel="stylesheet" href="../../assets/effects.css">
<style>
  html, body { margin: 0; padding: 0; background: var(--bg-gradient); color: var(--fg-1); font-family: var(--font-sans); min-height: 100vh; }
  body { background: linear-gradient(135deg, #0f172a 0%, #1e293b 100%); background-attachment: fixed; }
  /* Subtle bg-depth glows */
  body::before {
    content: ''; position: fixed; inset: 0; pointer-events: none; z-index: 0;
    background:
      radial-gradient(circle at 12% 8%, rgba(255,169,77,0.07), transparent 40%),
      radial-gradient(circle at 92% 22%, rgba(255,107,107,0.05), transparent 36%),
      radial-gradient(circle at 78% 88%, rgba(255,212,59,0.04), transparent 40%);
  }
  #root { position: relative; z-index: 1; }
  .pinp { background: rgba(15,23,42,0.6); border: 1px solid rgba(255,255,255,0.15); color:#fff; padding:12px 14px; border-radius:12px; font-size:14px; width:100%; box-sizing:border-box; font-family:inherit; outline:none; }
  .pinp:focus { border-color: #FFA94D; }
  .peaking-card:hover { transform: translateY(-4px); border-color: rgba(255,169,77,0.4); box-shadow: 0 18px 36px rgba(0,0,0,0.35), 0 0 24px rgba(255,169,77,0.12); }
  button:active { transform: scale(0.96); }
</style>
</head>
<body>
<div id="root"></div>

<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>

<script type="text/babel" src="components.jsx"></script>
<script type="text/babel" src="Login.jsx"></script>
<script type="text/babel" src="Dashboard.jsx"></script>
<script type="text/babel" src="Tracker.jsx"></script>
<script type="text/babel" src="App.jsx"></script>
</body>
</html>
