<!doctype html><html><head><meta charset="utf-8"><link rel="stylesheet" href="_card.css"></head><body>
<div style="display:flex;flex-wrap:wrap;gap:12px;align-items:center">
  <button style="background:linear-gradient(135deg,#FFD43B,#FFA94D,#FF6B6B);color:#0f172a;font-weight:800;padding:14px 22px;border:none;border-radius:14px;box-shadow:0 8px 24px rgba(255,169,77,0.35),inset 0 0 0 1px rgba(255,212,59,0.2);font-size:14px;cursor:pointer">🔓 Login</button>
  <button style="background:linear-gradient(135deg,#FFA94D,#FF6B6B);color:#0f172a;font-weight:800;padding:12px 20px;border:none;border-radius:14px;box-shadow:0 8px 20px rgba(255,169,77,0.3);font-size:13px;cursor:pointer">⚡ Zum Tool →</button>
  <button style="background:rgba(15,23,42,0.6);color:#fff;border:1px solid rgba(255,169,77,0.3);padding:12px 20px;border-radius:14px;font-weight:600;font-size:13px;cursor:pointer">📩 Beta-Access</button>
  <button style="background:transparent;color:#94a3b8;border:1px solid rgba(255,255,255,0.1);padding:10px 18px;border-radius:12px;font-size:13px;cursor:pointer">← Zurück</button>
  <button style="background:linear-gradient(135deg,#ef4444,#dc2626);color:#fff;padding:10px 16px;border:none;border-radius:10px;font-weight:700;font-size:12px;cursor:pointer">🗑️</button>
</div>
<div style="display:flex;gap:10px;margin-top:16px;align-items:center">
  <span style="font-size:11px;color:#64748b;letter-spacing:0.12em;text-transform:uppercase;font-weight:700">Press</span>
  <button style="background:linear-gradient(135deg,#FFA94D,#FF6B6B);color:#0f172a;font-weight:800;padding:10px 18px;border:none;border-radius:12px;font-size:13px;transform:scale(0.96);box-shadow:0 4px 14px rgba(255,169,77,0.25)">scale(0.96)</button>
  <span style="font-size:11px;color:#64748b">+ no color change · taktiles Feedback</span>
</div>
</body></html>
