<!doctype html><html><head><meta charset="utf-8"><link rel="stylesheet" href="_card.css"></head><body>
<style>
  .pb{display:flex;flex-direction:column;gap:10px}

  .fill{height:100%;border-radius:999px}
  .mark{position:absolute;top:-2px;height:12px;width:2px;background:rgba(255,255,255,0.5)}
</style>
<div class="pb">

  <div><div class="row"><b>💪 Gym · 3 (27%)</b><span style="color:#94a3b8">Ziel: 25% ✅</span></div><div class="track"><div class="fill" style="width:27%;background:#f59e0b"></div><div class="mark" style="left:25%"></div></div></div>
  <div><div class="row"><b>🧠 Mindset · 2 (18%)</b><span style="color:#94a3b8">Ziel: 20% ✅</span></div><div class="track"><div class="fill" style="width:18%;background:#8b5cf6"></div><div class="mark" style="left:20%"></div></div></div>
  <div><div class="row"><b>🌿 Plant-Based · 1 (10%)</b><span style="color:#94a3b8">Ziel: 15% ⬇️</span></div><div class="track"><div class="fill" style="width:10%;background:#84cc16"></div><div class="mark" style="left:15%"></div></div></div>
</div>
</body></html>
