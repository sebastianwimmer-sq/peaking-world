<!doctype html><html><head><meta charset="utf-8"><link rel="stylesheet" href="_card.css"></head><body>
<div class="row">
  <div style="flex:1;border-radius:14px;height:130px;background:linear-gradient(135deg,#0f172a 0%,#1e293b 100%);border:1px solid rgba(255,255,255,0.08);padding:12px;display:flex;flex-direction:column;justify-content:flex-end">
    <div style="font-size:11px;font-weight:700">App BG gradient</div>
    <div style="font-family:ui-monospace,monospace;font-size:10px;opacity:0.7">#0f172a → #1e293b · 135°</div>
  </div>
  <div style="flex:1;height:130px;border-radius:14px;background:#0f172a;padding:12px;display:flex;align-items:flex-end">
    <div class="glass" style="width:100%;backdrop-filter:blur(10px);padding:10px 12px"><div style="font-size:11px;font-weight:700">.glass surface</div><div style="font-family:ui-monospace,monospace;font-size:10px;opacity:0.7">rgba(30,41,59,0.6) · 10px blur</div></div>
  </div>
  <div style="flex:1;height:130px;border-radius:14px;background:rgba(15,23,42,0.95);padding:12px;border:1px solid rgba(255,255,255,0.08);display:flex;flex-direction:column;gap:8px;justify-content:flex-end">
    <input style="background:rgba(15,23,42,0.6);border:1px solid rgba(255,255,255,0.15);color:#fff;padding:10px;border-radius:10px;font-size:12px" placeholder="input · surface-input"/>
    <div style="font-family:ui-monospace,monospace;font-size:10px;opacity:0.7">rgba(15,23,42,0.6)</div>
  </div>
</div>
</body></html>
