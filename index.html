<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1">
<title>⛰️ PEAKING — Always peaking.</title>
<link rel="icon" href="assets/logo.svg" type="image/svg+xml">
<link rel="apple-touch-icon" href="assets/logo.svg">
<script src="https://cdn.tailwindcss.com"></script>
<style>
  body { 
    background: linear-gradient(135deg, #0f172a 0%, #1e293b 100%);
    min-height: 100dvh;
    color: white;
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 1rem;
  }
  .glass {
    background: rgba(30, 41, 59, 0.6);
    backdrop-filter: blur(10px);
    border: 1px solid rgba(255,255,255,0.1);
  }
  .neon { color: #FFA94D; }
  input {
    background: rgba(15, 23, 42, 0.6);
    border: 1px solid rgba(255,255,255,0.15);
    color: white;
  }
  input:focus {
    outline: none;
    border-color: #FFA94D;
  }
  .btn-primary {
    background: linear-gradient(135deg, #FFA94D, #FF6B6B);
    color: #0f172a;
    transition: all 0.2s;
    font-weight: bold;
  }
  .btn-primary:hover { transform: translateY(-2px); box-shadow: 0 8px 20px rgba(255, 169, 77, 0.3); }
  .shake { animation: shake 0.4s; }
  @keyframes shake {
    0%, 100% { transform: translateX(0); }
    25% { transform: translateX(-10px); }
    75% { transform: translateX(10px); }
  }
</style>
</head>
<body>

<div class="glass rounded-3xl p-8 w-full max-w-md">
  <div class="text-center mb-8">
    <img src="assets/logo.svg" alt="PEAKING" class="w-24 h-24 mx-auto mb-3">
    <h1 class="text-3xl font-bold mb-1 tracking-tight">PEAKING</h1>
    <p class="neon text-sm font-bold tracking-wide">Always peaking.</p>
    <p class="text-gray-500 text-xs mt-1">vegetarianhulk's command center</p>
  </div>

  <div id="loginForm" class="space-y-4">
    <div>
      <label class="block text-sm text-gray-400 mb-2">Passwort</label>
      <input type="password" id="passwordInput" placeholder="••••••••" 
             class="w-full p-4 rounded-xl text-lg" 
             autofocus 
             onkeypress="if(event.key==='Enter') tryLogin()">
    </div>

    <div id="errorMsg" class="hidden text-red-400 text-sm text-center">
      ❌ Falsches Passwort. Versuch's nochmal!
    </div>

    <button onclick="tryLogin()" class="btn-primary w-full p-4 rounded-xl text-lg">
      🔓 Login
    </button>
  </div>

  <div class="mt-8 text-center text-xs text-gray-500">
    <p>🔐 Geschützter Bereich</p>
    <p class="mt-1">⛰️ The climb is the peak.</p>
  </div>
</div>

<script src="js/app.js"></script>
<script>
async function tryLogin() {
  const input = document.getElementById('passwordInput').value;
  const errorMsg = document.getElementById('errorMsg');
  
  if (!input) {
    errorMsg.classList.remove('hidden');
    document.querySelector('.glass').classList.add('shake');
    setTimeout(() => document.querySelector('.glass').classList.remove('shake'), 400);
    return;
  }

  const success = await SmashApp.login(input);
  
  if (success) {
    window.location.href = 'dashboard.html';
  } else {
    errorMsg.classList.remove('hidden');
    document.getElementById('passwordInput').value = '';
    document.querySelector('.glass').classList.add('shake');
    setTimeout(() => document.querySelector('.glass').classList.remove('shake'), 400);
  }
}

// Auto-redirect if already logged in
if (SmashApp.isAuthenticated()) {
  window.location.href = 'dashboard.html';
}
</script>

</body>
</html>
