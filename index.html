<link rel="stylesheet" href="assets/effects.css">
<script src="https://cdn.tailwindcss.com"></script>
<style>
  body {
    background:
      radial-gradient(120% 80% at 50% -10%, rgba(0,184,136,0.14), transparent 60%),
      radial-gradient(90% 60% at 50% 120%, rgba(0,184,136,0.08), transparent 55%),
      #03080D;
    min-height: 100dvh;
    color: white;
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 1rem;
  }
  .glass {
    background: rgba(30, 41, 59, 0.6);
    backdrop-filter: blur(10px);
    border: 1px solid rgba(255,255,255,0.1);
  }
  .neon { color: #00B888; }
  input {
    background: rgba(15, 23, 42, 0.6);
    border: 1px solid rgba(255,255,255,0.15);
    color: white;
  }
  input:focus {
    outline: none;
    border-color: #00B888;
  }
  .btn-primary {
    background: linear-gradient(135deg, #00B888, #1FC998);
    color: #04201A;
    transition: all 0.2s;
    font-weight: bold;
  }
  .btn-primary:hover { transform: translateY(-2px); box-shadow: 0 8px 20px rgba(0, 184, 136, 0.3); }
  .shake { animation: shake 0.4s; }
  @keyframes shake {
    0%, 100% { transform: translateX(0); }
    25% { transform: translateX(-10px); }
    75% { transform: translateX(10px); }
  }
</style>
</head>
<body class="bg-depth">

<div class="glass rounded-3xl p-8 w-full max-w-md scale-in">
  <div class="text-center mb-8">
    <img src="assets/s2s-wordmark.png" alt="social2scale" class="logo-glow-strong" style="height:42px;width:auto;margin:0 auto 14px;display:block">
    <p class="neon text-sm font-bold tracking-wide">Dein Wachstums-Cockpit</p>
  </div>

  <div id="loginForm" class="space-y-4">
    <div>
      <label class="block text-sm text-gray-400 mb-2">Passwort</label>
      <input type="password" id="passwordInput" placeholder="••••••••" 
             class="w-full p-4 rounded-xl text-lg" 
             autofocus 
             onkeypress="if(event.key==='Enter') tryLogin()">
    </div>

    <div id="errorMsg" class="hidden text-red-400 text-sm text-center">
      ❌ Falsches Passwort. Versuch's nochmal!
    </div>

    <button onclick="tryLogin()" class="btn-primary btn-shimmer btn-glow-strong press-feedback w-full p-4 rounded-xl text-lg">
      🔓 Login
    </button>
  </div>

  <div class="mt-8 text-center text-xs text-gray-500">
    <p>🔐 Geschützter Bereich</p>
    <p class="mt-1">Strategie statt Zufall.</p>
    <p class="mt-1 text-gray-600">powered by PEAKING</p>
  </div>
</div>

<script src="js/app.js"></script>
<script>
// Service-Worker für Offline-Capability registrieren
if ('serviceWorker' in navigator) {
  navigator.serviceWorker.register('sw.js').catch(err => console.warn('SW reg failed:', err));
}

async function tryLogin() {
  const input = document.getElementById('passwordInput').value;
  const errorMsg = document.getElementById('errorMsg');

  if (!input) {
    errorMsg.classList.remove('hidden');
    document.querySelector('.glass').classList.add('shake');
    setTimeout(() => document.querySelector('.glass').classList.remove('shake'), 400);
    return;
  }

  try {
    const success = await SmashApp.login(input);

    if (success) {
      window.location.href = 'dashboard.html';
    } else {
      errorMsg.textContent = '❌ Falsches Passwort. Versuch\'s nochmal!';
      errorMsg.classList.remove('hidden');
      document.getElementById('passwordInput').value = '';
      document.querySelector('.glass').classList.add('shake');
      setTimeout(() => document.querySelector('.glass').classList.remove('shake'), 400);
    }
  } catch (err) {
    // Surface JS errors instead of silent fail
    errorMsg.textContent = '⚠️ Login-Fehler: ' + (err.message || err);
    errorMsg.classList.remove('hidden');
    console.error('Login error:', err);
  }
}

// Auto-redirect if already logged in
if (SmashApp.isAuthenticated()) {
  window.location.href = 'dashboard.html';
}
</script>
