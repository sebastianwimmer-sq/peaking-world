    white-space: nowrap;

    display: inline-block;
    padding: 3px 10px;
    border-radius: 999px;
    font-size: 11px;
    font-weight: 700;
    color:#04201A;
  }
  .func-tag {
    display: inline-block;
    padding: 2px 8px;
    border-radius: 6px;
    font-size: 10px;
    font-weight: 600;
    background: rgba(255,255,255,0.08);
    color: #94a3b8;
    text-transform: uppercase;
    letter-spacing: 0.5px;
  }
  .var-highlight {
    background: rgba(0, 184, 136, 0.15);
    color: #00B888;
    padding: 1px 4px;
    border-radius: 4px;
    font-weight: 700;
  }
  input, select, textarea {
    background: rgba(255, 255, 255, 0.03);

  </div>

  <div class="text-center text-gray-500 text-xs mt-12">
    powered by PEAKING · Tap + für eigenes Template
  </div>
</div>

<!-- FAB (only on templates tab) -->
<button id="fab" class="fab" onclick="openAddModal()" title="Eigenes Template">+</button>

<!-- Use Modal -->
<div id="useModal" class="hidden fixed inset-0 modal-bg z-50 flex items-center justify-center p-4">

    <div class="flex justify-between items-center mb-4">

    <div id="previewBox" class="preview-box mb-4"></div>

      <input type="checkbox" id="includeHashtags" onchange="updatePreview()">

    </label>

    <button onclick="copyPreview()" class="btn-primary w-full p-3 rounded-xl">📋 Caption kopieren</button>
  </div>
</div>

<!-- Add/Edit Custom Modal -->
<div id="addModal" class="hidden fixed inset-0 modal-bg z-50 flex items-center justify-center p-4">

</div>

    currentPillars.includes(t.pillar) || t.custom
  );
  renderPillarChips();
  fillPillarSelect();
  bindFilters();
  render();
  renderHashtags();
}

function renderPillarChips() {
  const container = document.querySelector('[data-chip-group="pillar"]');
  if (!container) return;
  let html = '<button class="chip active" data-filter="pillar" data-value="all">Alle</button>';
  Object.entries(SmashApp.PILLAR_INFO).forEach(([key, info]) => {
    html += `<button class="chip" data-filter="pillar" data-value="${key}">${info.emoji} ${info.name.split('/')[0].split('-')[0]}</button>`;
  });
  container.innerHTML = html;
}

function fillPillarSelect() {
  const sel = document.getElementById('tplPillar');
  if (!sel) return;
  sel.innerHTML = Object.entries(SmashApp.PILLAR_INFO).map(([key, info]) =>
    `<option value="${key}">${info.emoji} ${info.name}</option>`
  ).join('');
}

function bindFilters() {
  document.querySelectorAll('.chip[data-filter]').forEach(btn => {
    btn.addEventListener('click', () => {
      const filter = btn.dataset.filter;
      filters[filter] = btn.dataset.value;
      document.querySelectorAll(`.chip[data-filter="${filter}"]`).forEach(b => b.classList.remove('active'));
      btn.classList.add('active');
      render();
    });
  });
}

// ============ RENDER ============
function render() {
  const filtered = templates.filter(t => {
    if (filters.pillar !== 'all' && t.pillar !== filters.pillar) return false;
    if (filters.func !== 'all' && t.func !== filters.func) return false;
    return true;
  });

  document.getElementById('captionStats').textContent =
    `${templates.length} Templates · ${templates.filter(t => t.custom).length} eigene`;

  const list = document.getElementById('templatesList');
  const empty = document.getElementById('emptyState');

  if (filtered.length === 0) {
    list.innerHTML = '';
    empty.classList.remove('hidden');
    return;
  }
  empty.classList.add('hidden');
  list.innerHTML = filtered.map(t => renderCard(t)).join('');
}

function renderCard(t) {
  const info = SmashApp.PILLAR_INFO[t.pillar] || { emoji: '🎬', name: '?', color: '#64748b' };
  const highlighted = escapeHtml(t.text).replace(/\[([A-ZÄÖÜ_]+)\]/g, '<span class="var-highlight">[$1]</span>');
  return `
    <div class="glass rounded-2xl p-4">
      <div class="flex items-center justify-between mb-3 gap-2">
        <span class="pillar-pill" style="background: ${info.color}">${info.emoji} ${info.name}</span>
        <span class="func-tag">${FUNC_LABELS[t.func] || t.func}</span>
        ${t.custom ? '<span class="text-xs neon">⭐ Eigene</span>' : ''}
      </div>
      <p class="text-sm mb-3 leading-relaxed whitespace-pre-line">${highlighted}</p>
      <div class="flex gap-2">
        <button onclick="useTemplate(${t.id})" class="btn-primary text-xs px-3 py-2 rounded-lg flex-1">▶ Verwenden</button>
        ${t.custom ? `<button onclick="editCustomTemplate(${t.id})" class="text-xs px-3 py-2 rounded-lg bg-slate-500/20 text-slate-300 hover:bg-slate-500/30">✏️ Edit</button>` : ''}
        <button onclick="quickCopy(${t.id})" class="text-xs px-3 py-2 rounded-lg bg-slate-500/20 text-slate-300 hover:bg-slate-500/30" title="Direkt kopieren">📋</button>
      </div>
    </div>
  `;
}

function renderHashtags() {
  const html = Object.entries(HASHTAG_SETS).map(([pillar, tags]) => {
    const info = SmashApp.PILLAR_INFO[pillar];
    return `
      <div class="glass rounded-2xl p-4 cursor-pointer hover:border-green-400/40" onclick="copyHashtags('${pillar}')">
        <div class="flex items-center justify-between mb-3">
          <span class="pillar-pill" style="background: ${info.color}">${info.emoji} ${info.name}</span>
          <span class="text-xs neon">📋 Tap zum Kopieren</span>
        </div>
        <p class="text-xs text-gray-300 leading-relaxed">${tags.join(' ')}</p>
      </div>
    `;
  }).join('');
  document.getElementById('hashtagSets').innerHTML = html;
}

function escapeHtml(s) {
  return String(s ?? '').replace(/[&<>"']/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));
}

// ============ TABS ============
function switchTab(tab) {
  document.querySelectorAll('.tab-btn').forEach(b => b.classList.toggle('active', b.dataset.tab === tab));
  document.getElementById('tab-templates').classList.toggle('hidden', tab !== 'templates');
  document.getElementById('tab-hashtags').classList.toggle('hidden', tab !== 'hashtags');
  document.getElementById('fab').style.display = tab === 'templates' ? 'flex' : 'none';
}

// ============ USE TEMPLATE ============
function extractVariables(text) {
  const matches = text.match(/\[([A-ZÄÖÜ_]+)\]/g) || [];
  return [...new Set(matches.map(m => m.slice(1, -1)))];
}

function useTemplate(id) {
  const t = templates.find(x => x.id === id);
  if (!t) return;
  currentTemplate = t;
  const vars = extractVariables(t.text);
  const inputsEl = document.getElementById('varInputs');

  if (vars.length === 0) {
    inputsEl.innerHTML = '<p class="text-xs text-gray-500 italic">Keine Variablen — direkt kopierbar.</p>';
  } else {
    inputsEl.innerHTML = '<div class="text-xs text-gray-500 font-bold uppercase tracking-wider mb-2">Variablen ausfüllen</div>' +
      vars.map(v => `
        <div>
          <label class="block text-xs text-gray-400 mb-1">[${v}]</label>
          <input type="text" data-var="${v}" placeholder="..." class="w-full p-2 rounded-lg text-sm" oninput="updatePreview()">
        </div>
      `).join('');
  }

  document.getElementById('includeHashtags').checked = false;
  updatePreview();
  document.getElementById('useModal').classList.remove('hidden');
}

function updatePreview() {
  if (!currentTemplate) return;
  let result = currentTemplate.text;
  document.querySelectorAll('#varInputs input[data-var]').forEach(input => {
    const v = input.dataset.var;
    const val = input.value || `[${v}]`;
    result = result.replaceAll(`[${v}]`, val);
  });
  if (document.getElementById('includeHashtags').checked) {
    const tags = HASHTAG_SETS[currentTemplate.pillar] || [];
    result += `\n\n.\n.\n.\n${tags.join(' ')}`;
  }
  document.getElementById('previewBox').textContent = result;
}

function closeUseModal() {
  document.getElementById('useModal').classList.add('hidden');
  currentTemplate = null;
}

async function copyPreview() {
  const text = document.getElementById('previewBox').textContent;
  try {
    await navigator.clipboard.writeText(text);
    showToast('✓ Caption kopiert');
    closeUseModal();
  } catch (e) {
    showToast('⚠️ Copy fehlgeschlagen');
  }
}

async function quickCopy(id) {
  const t = templates.find(x => x.id === id);
  if (!t) return;
  try {
    await navigator.clipboard.writeText(t.text);
    showToast('✓ Template kopiert');
  } catch (e) {
    showToast('⚠️ Copy fehlgeschlagen');
  }
}

async function copyHashtags(pillar) {
  const tags = HASHTAG_SETS[pillar];
  if (!tags) return;
  try {
    await navigator.clipboard.writeText(tags.join(' '));
    showToast(`✓ ${tags.length} Hashtags kopiert`);
  } catch (e) {
    showToast('⚠️ Copy fehlgeschlagen');
  }
}

// ============ CUSTOM TEMPLATES ============
function openAddModal() {
  editingId = null;
  document.getElementById('modalTitle').textContent = '➕ Eigenes Template';
  document.getElementById('tplText').value = '';
  document.getElementById('tplPillar').value = 'outdoor';
  document.getElementById('tplFunc').value = 'hook';
  document.getElementById('deleteBtn').classList.add('hidden');
  document.getElementById('addModal').classList.remove('hidden');
}

function editCustomTemplate(id) {
  const t = templates.find(x => x.id === id);
  if (!t || !t.custom) return;
  editingId = id;
  document.getElementById('modalTitle').textContent = '✏️ Template bearbeiten';
  document.getElementById('tplText').value = t.text;
  document.getElementById('tplPillar').value = t.pillar;
  document.getElementById('tplFunc').value = t.func;
  document.getElementById('deleteBtn').classList.remove('hidden');
  document.getElementById('addModal').classList.remove('hidden');
}

function closeAddModal() {
  document.getElementById('addModal').classList.add('hidden');
  editingId = null;
}

function saveCustomTemplate() {
  const text = document.getElementById('tplText').value.trim();
  if (!text) { showToast('⚠️ Text fehlt'); return; }

  const customs = SmashApp.getData('captionsCustom', []);
  const data = {
    text,
    pillar: document.getElementById('tplPillar').value,
    func: document.getElementById('tplFunc').value,
    custom: true
  };

  if (editingId) {
    const idx = customs.findIndex(c => c.id === editingId);
    if (idx >= 0) customs[idx] = { ...customs[idx], ...data };
    showToast('💾 Aktualisiert');
  } else {
    customs.push({ id: Date.now(), ...data });
    showToast('💾 Eigenes Template gespeichert');
  }

  SmashApp.setData('captionsCustom', customs);
  templates = [...SEED_TEMPLATES, ...customs];
  closeAddModal();
  render();
}

function deleteCustomTemplate() {
  if (!editingId) return;
  if (!confirm('Eigenes Template wirklich löschen?')) return;
  let customs = SmashApp.getData('captionsCustom', []);
  customs = customs.filter(c => c.id !== editingId);
  SmashApp.setData('captionsCustom', customs);
  templates = [...SEED_TEMPLATES, ...customs];
  closeAddModal();
  render();
  showToast('🗑️ Gelöscht');
}

// ============ TOAST ============
let toastTimer;
function showToast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  clearTimeout(toastTimer);
  toastTimer = setTimeout(() => t.classList.remove('show'), 1800);
}

// Modal-Backdrop close
document.getElementById('useModal').addEventListener('click', e => { if (e.target.id === 'useModal') closeUseModal(); });
document.getElementById('addModal').addEventListener('click', e => { if (e.target.id === 'addModal') closeAddModal(); });

init();
</script>

</body>
