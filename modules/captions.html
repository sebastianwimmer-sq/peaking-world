<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1">
<title>🎨 Captions — PEAKING</title>
<script src="https://cdn.tailwindcss.com"></script>
<script src="../js/app.js"></script>
<style>
  body {
    background: linear-gradient(135deg, #0f172a 0%, #1e293b 100%);
    min-height: 100dvh;
    color: white;
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
  }
  .glass {
    background: rgba(30, 41, 59, 0.6);
    backdrop-filter: blur(10px);
    border: 1px solid rgba(255,255,255,0.1);
  }
  .neon { color: #39FF14; }
  .btn-primary {
    background: linear-gradient(135deg, #39FF14, #2ecc71);
    color: #0f172a;
    font-weight: bold;
    transition: all 0.2s;
  }
  .btn-primary:hover { transform: translateY(-2px); box-shadow: 0 8px 20px rgba(57, 255, 20, 0.3); }
  .chip {
    display: inline-flex;
    align-items: center;
    padding: 6px 12px;
    border-radius: 999px;
    font-size: 13px;
    font-weight: 600;
    border: 1px solid rgba(255,255,255,0.15);
    background: rgba(15, 23, 42, 0.6);
    color: #cbd5e1;
    cursor: pointer;
    transition: all 0.15s;
    white-space: nowrap;
  }
  .chip:hover { border-color: rgba(57, 255, 20, 0.5); }
  .chip.active {
    background: linear-gradient(135deg, #39FF14, #2ecc71);
    color: #0f172a;
    border-color: #39FF14;
  }
  .pillar-pill {
    display: inline-block;
    padding: 3px 10px;
    border-radius: 999px;
    font-size: 11px;
    font-weight: 700;
    color: #0f172a;
  }
  .func-tag {
    display: inline-block;
    padding: 2px 8px;
    border-radius: 6px;
    font-size: 10px;
    font-weight: 600;
    background: rgba(255,255,255,0.08);
    color: #94a3b8;
    text-transform: uppercase;
    letter-spacing: 0.5px;
  }
  .var-highlight {
    background: rgba(57, 255, 20, 0.15);
    color: #39FF14;
    padding: 1px 4px;
    border-radius: 4px;
    font-weight: 700;
  }
  input, select, textarea {
    background: rgba(15, 23, 42, 0.6);
    border: 1px solid rgba(255,255,255,0.15);
    color: white;
  }
  input:focus, select:focus, textarea:focus {
    outline: none;
    border-color: #39FF14;
  }
  .modal-bg { background: rgba(0,0,0,0.7); backdrop-filter: blur(4px); }
  .filter-scroll::-webkit-scrollbar { display: none; }
  .filter-scroll { -ms-overflow-style: none; scrollbar-width: none; }
  .toast {
    position: fixed; bottom: 24px; left: 50%;
    transform: translateX(-50%) translateY(100px);
    background: #39FF14; color: #0f172a;
    padding: 12px 24px; border-radius: 999px; font-weight: bold;
    box-shadow: 0 8px 24px rgba(57, 255, 20, 0.4);
    transition: transform 0.3s ease; z-index: 100;
  }
  .toast.show { transform: translateX(-50%) translateY(0); }
  .fab {
    position: fixed; bottom: 20px; right: 20px;
    width: 56px; height: 56px; border-radius: 999px;
    background: linear-gradient(135deg, #39FF14, #2ecc71);
    color: #0f172a; font-size: 28px; font-weight: bold;
    box-shadow: 0 8px 24px rgba(57, 255, 20, 0.4);
    display: flex; align-items: center; justify-content: center;
    cursor: pointer; z-index: 50; border: none; transition: transform 0.2s;
  }
  .fab:hover { transform: scale(1.1); }
  .tab-btn {
    flex: 1;
    padding: 10px 12px;
    text-align: center;
    font-weight: 700;
    color: #94a3b8;
    border-bottom: 3px solid transparent;
    cursor: pointer;
    transition: all 0.15s;
    font-size: 14px;
  }
  .tab-btn.active { color: #39FF14; border-bottom-color: #39FF14; }
  .preview-box {
    background: rgba(15, 23, 42, 0.8);
    border: 1px solid rgba(57, 255, 20, 0.2);
    border-radius: 12px;
    padding: 14px;
    white-space: pre-wrap;
    font-size: 14px;
    line-height: 1.6;
    min-height: 80px;
    max-height: 200px;
    overflow-y: auto;
  }
</style>
</head>
<body class="p-4 md:p-6 pb-24">

<div class="max-w-5xl mx-auto">

  <!-- Header -->
  <div class="flex justify-between items-center mb-4">
    <div>
      <a href="../dashboard.html" class="text-xs text-gray-400 hover:text-white">← Dashboard</a>
      <h1 class="text-2xl md:text-3xl font-bold mt-1">🎨 Caption Library</h1>
      <p class="text-gray-400 text-sm" id="captionStats">0 Templates</p>
    </div>
    <button onclick="SmashApp.logout()" class="text-sm text-gray-400 hover:text-white">🔒 Logout</button>
  </div>

  <!-- Tabs -->
  <div class="glass rounded-2xl mb-5 flex overflow-hidden">
    <div class="tab-btn active" data-tab="templates" onclick="switchTab('templates')">📝 Templates</div>
    <div class="tab-btn" data-tab="hashtags" onclick="switchTab('hashtags')">🏷️ Hashtag-Sets</div>
  </div>

  <!-- TAB: Templates -->
  <div id="tab-templates">
    <div class="mb-2 text-xs text-gray-500 font-bold uppercase tracking-wider">Säule</div>
    <div class="filter-scroll flex gap-2 mb-3 overflow-x-auto pb-1">
      <button class="chip active" data-filter="pillar" data-value="all">Alle</button>
      <button class="chip" data-filter="pillar" data-value="outdoor">🏔️ Outdoor</button>
      <button class="chip" data-filter="pillar" data-value="gym">💪 Gym</button>
      <button class="chip" data-filter="pillar" data-value="mindset">🧠 Mindset</button>
      <button class="chip" data-filter="pillar" data-value="plantbased">🌿 Plant</button>
    </div>

    <div class="mb-2 text-xs text-gray-500 font-bold uppercase tracking-wider">Funktion</div>
    <div class="filter-scroll flex gap-2 mb-5 overflow-x-auto pb-1">
      <button class="chip active" data-filter="func" data-value="all">Alle</button>
      <button class="chip" data-filter="func" data-value="hook">🎯 Hook</button>
      <button class="chip" data-filter="func" data-value="story">📖 Story</button>
      <button class="chip" data-filter="func" data-value="cta">📢 CTA</button>
      <button class="chip" data-filter="func" data-value="question">❓ Frage</button>
      <button class="chip" data-filter="func" data-value="quote">💬 Quote</button>
    </div>

    <div id="templatesList" class="grid grid-cols-1 md:grid-cols-2 gap-3"></div>
    <div id="emptyState" class="hidden text-center py-12 text-gray-500">
      <div class="text-5xl mb-3">🤷</div>
      <p>Keine Templates mit diesen Filtern.</p>
    </div>
  </div>

  <!-- TAB: Hashtags -->
  <div id="tab-hashtags" class="hidden">
    <p class="text-gray-400 text-sm mb-4">Tap auf eine Säule um das Hashtag-Set zu kopieren.</p>
    <div id="hashtagSets" class="grid grid-cols-1 md:grid-cols-2 gap-3"></div>
  </div>

  <div class="text-center text-gray-500 text-xs mt-12">
    🎨 PEAKING · Always peaking. · Tap + für eigenes Template
  </div>
</div>

<!-- FAB (only on templates tab) -->
<button id="fab" class="fab" onclick="openAddModal()" title="Eigenes Template">+</button>

<!-- Use Modal -->
<div id="useModal" class="hidden fixed inset-0 modal-bg z-50 flex items-center justify-center p-4">
  <div class="glass rounded-3xl p-6 w-full max-w-lg max-h-[90vh] overflow-y-auto">
    <div class="flex justify-between items-center mb-4">
      <h2 class="text-xl font-bold">🎨 Template anpassen</h2>
      <button onclick="closeUseModal()" class="text-gray-400 hover:text-white text-2xl">×</button>
    </div>

    <div id="varInputs" class="space-y-2 mb-4"></div>

    <div class="text-xs text-gray-500 mb-2 font-bold uppercase tracking-wider">Live-Preview</div>
    <div id="previewBox" class="preview-box mb-4"></div>

    <label class="flex items-center gap-2 mb-3 text-sm cursor-pointer">
      <input type="checkbox" id="includeHashtags" onchange="updatePreview()">
      <span>Hashtag-Set anhängen</span>
    </label>

    <button onclick="copyPreview()" class="btn-primary w-full p-3 rounded-xl">📋 Caption kopieren</button>
  </div>
</div>

<!-- Add/Edit Custom Modal -->
<div id="addModal" class="hidden fixed inset-0 modal-bg z-50 flex items-center justify-center p-4">
  <div class="glass rounded-3xl p-6 w-full max-w-md max-h-[90vh] overflow-y-auto">
    <div class="flex justify-between items-center mb-4">
      <h2 class="text-xl font-bold" id="modalTitle">➕ Eigenes Template</h2>
      <button onclick="closeAddModal()" class="text-gray-400 hover:text-white text-2xl">×</button>
    </div>
    <div class="space-y-3">
      <div>
        <label class="block text-xs text-gray-400 mb-1">Template-Text * <span class="text-gray-500">(Variablen mit [GROSSBUCHSTABEN])</span></label>
        <textarea id="tplText" rows="5" class="w-full p-3 rounded-xl text-sm" placeholder="z.B. Heute auf [BERGNAME], [HÖHE]hm. Was ich gelernt hab: [LESSON]"></textarea>
      </div>
      <div class="grid grid-cols-2 gap-3">
        <div>
          <label class="block text-xs text-gray-400 mb-1">Säule</label>
          <select id="tplPillar" class="w-full p-3 rounded-xl text-sm">
            <option value="outdoor">🏔️ Outdoor</option>
            <option value="gym">💪 Gym</option>
            <option value="mindset">🧠 Mindset</option>
            <option value="plantbased">🌿 Plant-Based</option>
          </select>
        </div>
        <div>
          <label class="block text-xs text-gray-400 mb-1">Funktion</label>
          <select id="tplFunc" class="w-full p-3 rounded-xl text-sm">
            <option value="hook">🎯 Hook</option>
            <option value="story">📖 Story</option>
            <option value="cta">📢 CTA</option>
            <option value="question">❓ Frage</option>
            <option value="quote">💬 Quote</option>
          </select>
        </div>
      </div>
      <button onclick="saveCustomTemplate()" class="btn-primary w-full p-3 rounded-xl">💾 Speichern</button>
      <button id="deleteBtn" onclick="deleteCustomTemplate()" class="hidden w-full p-2 text-sm text-red-400 hover:text-red-300">🗑️ Löschen</button>
    </div>
  </div>
</div>

<div id="toast" class="toast">✓ OK</div>

<script>
SmashApp.requireAuth();

// ============ SEED TEMPLATES ============
const SEED_TEMPLATES = [
  // OUTDOOR
  { id: 1001, pillar: 'outdoor', func: 'hook', text: "POV: Du hast keine Lust, aber [BERGNAME] ruft.\n\n[STORY]\n\n👇 Wer kennt's?" },
  { id: 1002, pillar: 'outdoor', func: 'story', text: "Heute auf [BERGNAME], [HÖHE]hm Aufstieg.\n\nWas ich dort oben verstanden hab:\n[LESSON]\n\nDas sind die Momente, für die ich's mache. 🏔️" },
  { id: 1003, pillar: 'outdoor', func: 'cta', text: "Speicher dieses Reel — du wirst's brauchen, wenn dir mal die Discipline fehlt.\n\n[NACHSATZ]" },
  { id: 1004, pillar: 'outdoor', func: 'question', text: "Frage: Wann warst du das letzte Mal allein im Berg?\n\n[INSIGHT]\n\n👇 Schreib's mir." },
  { id: 1005, pillar: 'outdoor', func: 'quote', text: "Manche Verluste sind Upgrades.\n\n[BERGNAME] hat mir mehr gegeben als jede Beziehung jemals konnte. 🏔️" },

  // GYM
  { id: 1011, pillar: 'gym', func: 'hook', text: "POV: 6 AM, Gym leer, deine Discipline füllt den Raum.\n\n[STORY]\n\n💪 Wer auch?" },
  { id: 1012, pillar: 'gym', func: 'story', text: "[ÜBUNG] für [WOCHEN] Wochen.\n\nDas hat sich verändert: [RESULT]\n\nKein Geheimrezept. Nur Konsistenz." },
  { id: 1013, pillar: 'gym', func: 'cta', text: "Speicher dieses Workout — und mach's diese Woche mindestens einmal.\n\n[NACHSATZ]" },
  { id: 1014, pillar: 'gym', func: 'question', text: "Frage: Was ist deine Lieblings-Pump-Übung für [MUSKELGRUPPE]?\n\nSchreib's mir, ich teste sie diese Woche." },
  { id: 1015, pillar: 'gym', func: 'quote', text: "Discipline beats motivation. Every. Single. Day. 💪" },

  // MINDSET
  { id: 1021, pillar: 'mindset', func: 'hook', text: "Was ich mit [ALTER] verstanden hab, das die meisten nie checken:\n\n[INSIGHT]\n\nSpeicher's. Lies's nochmal. 🧠" },
  { id: 1022, pillar: 'mindset', func: 'story', text: "Vor [ZEIT] war ich noch [ALTES_VERHALTEN].\n\nHeute: [NEUES_VERHALTEN].\n\nWas hat sich geändert? [TRIGGER]" },
  { id: 1023, pillar: 'mindset', func: 'cta', text: "Diese Woche ein Experiment: [HABIT] für 7 Tage.\n\nSag mir Sonntag wie's lief. 👇" },
  { id: 1024, pillar: 'mindset', func: 'question', text: "Frage: Was ist deine 'kleine' Gewohnheit, die alles verändert hat?\n\n👇 Ich sammle Inspiration." },
  { id: 1025, pillar: 'mindset', func: 'quote', text: "Stop chasing motivation. Build discipline." },

  // PLANT-BASED
  { id: 1031, pillar: 'plantbased', func: 'hook', text: "POV: Du baust Muskeln auf Pflanzen — und alle fragen 'aber dein Protein?'.\n\n[STORY]\n\n🌿 Beweis ist im Bild." },
  { id: 1032, pillar: 'plantbased', func: 'story', text: "[MEAL] vor dem Workout.\n\n[PROTEIN]g Eiweiß · [KCAL] kcal · 100% pflanzlich.\n\nKein Shake nötig." },
  { id: 1033, pillar: 'plantbased', func: 'cta', text: "Speicher dieses Rezept — mach's diese Woche statt deines Standard-Meals.\n\n[NACHSATZ]" },
  { id: 1034, pillar: 'plantbased', func: 'question', text: "Frage: Was ist dein Go-To-Plant-Based-Meal an Trainingstagen?\n\nIch sammle Ideen. 🌿" },
  { id: 1035, pillar: 'plantbased', func: 'quote', text: "Strong on plants. Built different. 🌿💪" }
];

// ============ HASHTAG SETS ============
const HASHTAG_SETS = {
  outdoor: ['#hiking', '#mountains', '#outdoors', '#naturelovers', '#wanderlust', '#bergliebe', '#alpen', '#solohike', '#adventure', '#mountainlife'],
  gym: ['#gym', '#fitness', '#workout', '#discipline', '#nopainnogain', '#gymlife', '#pump', '#strongnotskinny', '#motivation', '#gymmotivation'],
  mindset: ['#mindset', '#stoicism', '#discipline', '#mentalhealth', '#growthmindset', '#selfimprovement', '#grindset', '#personaldevelopment', '#morningroutine', '#mindsetmatters'],
  plantbased: ['#plantbased', '#vegan', '#plantprotein', '#veganfitness', '#plantbaseddiet', '#vegangains', '#plantpower', '#vegetarian', '#cleaneating', '#healthylifestyle']
};

const FUNC_LABELS = {
  hook: '🎯 Hook',
  story: '📖 Story',
  cta: '📢 CTA',
  question: '❓ Frage',
  quote: '💬 Quote'
};

let templates = [];
let currentTemplate = null;
let editingId = null;
const filters = { pillar: 'all', func: 'all' };

// ============ INIT ============
function init() {
  const customs = SmashApp.getData('captionsCustom', []);
  templates = [...SEED_TEMPLATES, ...customs];
  bindFilters();
  render();
  renderHashtags();
}

function bindFilters() {
  document.querySelectorAll('.chip[data-filter]').forEach(btn => {
    btn.addEventListener('click', () => {
      const filter = btn.dataset.filter;
      filters[filter] = btn.dataset.value;
      document.querySelectorAll(`.chip[data-filter="${filter}"]`).forEach(b => b.classList.remove('active'));
      btn.classList.add('active');
      render();
    });
  });
}

// ============ RENDER ============
function render() {
  const filtered = templates.filter(t => {
    if (filters.pillar !== 'all' && t.pillar !== filters.pillar) return false;
    if (filters.func !== 'all' && t.func !== filters.func) return false;
    return true;
  });

  document.getElementById('captionStats').textContent =
    `${templates.length} Templates · ${templates.filter(t => t.custom).length} eigene`;

  const list = document.getElementById('templatesList');
  const empty = document.getElementById('emptyState');

  if (filtered.length === 0) {
    list.innerHTML = '';
    empty.classList.remove('hidden');
    return;
  }
  empty.classList.add('hidden');
  list.innerHTML = filtered.map(t => renderCard(t)).join('');
}

function renderCard(t) {
  const info = SmashApp.PILLAR_INFO[t.pillar] || { emoji: '🎬', name: '?', color: '#64748b' };
  const highlighted = escapeHtml(t.text).replace(/\[([A-ZÄÖÜ_]+)\]/g, '<span class="var-highlight">[$1]</span>');
  return `
    <div class="glass rounded-2xl p-4">
      <div class="flex items-center justify-between mb-3 gap-2">
        <span class="pillar-pill" style="background: ${info.color}">${info.emoji} ${info.name}</span>
        <span class="func-tag">${FUNC_LABELS[t.func] || t.func}</span>
        ${t.custom ? '<span class="text-xs neon">⭐ Eigene</span>' : ''}
      </div>
      <p class="text-sm mb-3 leading-relaxed whitespace-pre-line">${highlighted}</p>
      <div class="flex gap-2">
        <button onclick="useTemplate(${t.id})" class="btn-primary text-xs px-3 py-2 rounded-lg flex-1">▶ Verwenden</button>
        ${t.custom ? `<button onclick="editCustomTemplate(${t.id})" class="text-xs px-3 py-2 rounded-lg bg-slate-500/20 text-slate-300 hover:bg-slate-500/30">✏️ Edit</button>` : ''}
        <button onclick="quickCopy(${t.id})" class="text-xs px-3 py-2 rounded-lg bg-slate-500/20 text-slate-300 hover:bg-slate-500/30" title="Direkt kopieren">📋</button>
      </div>
    </div>
  `;
}

function renderHashtags() {
  const html = Object.entries(HASHTAG_SETS).map(([pillar, tags]) => {
    const info = SmashApp.PILLAR_INFO[pillar];
    return `
      <div class="glass rounded-2xl p-4 cursor-pointer hover:border-green-400/40" onclick="copyHashtags('${pillar}')">
        <div class="flex items-center justify-between mb-3">
          <span class="pillar-pill" style="background: ${info.color}">${info.emoji} ${info.name}</span>
          <span class="text-xs neon">📋 Tap zum Kopieren</span>
        </div>
        <p class="text-xs text-gray-300 leading-relaxed">${tags.join(' ')}</p>
      </div>
    `;
  }).join('');
  document.getElementById('hashtagSets').innerHTML = html;
}

function escapeHtml(s) {
  return String(s ?? '').replace(/[&<>"']/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));
}

// ============ TABS ============
function switchTab(tab) {
  document.querySelectorAll('.tab-btn').forEach(b => b.classList.toggle('active', b.dataset.tab === tab));
  document.getElementById('tab-templates').classList.toggle('hidden', tab !== 'templates');
  document.getElementById('tab-hashtags').classList.toggle('hidden', tab !== 'hashtags');
  document.getElementById('fab').style.display = tab === 'templates' ? 'flex' : 'none';
}

// ============ USE TEMPLATE ============
function extractVariables(text) {
  const matches = text.match(/\[([A-ZÄÖÜ_]+)\]/g) || [];
  return [...new Set(matches.map(m => m.slice(1, -1)))];
}

function useTemplate(id) {
  const t = templates.find(x => x.id === id);
  if (!t) return;
  currentTemplate = t;
  const vars = extractVariables(t.text);
  const inputsEl = document.getElementById('varInputs');

  if (vars.length === 0) {
    inputsEl.innerHTML = '<p class="text-xs text-gray-500 italic">Keine Variablen — direkt kopierbar.</p>';
  } else {
    inputsEl.innerHTML = '<div class="text-xs text-gray-500 font-bold uppercase tracking-wider mb-2">Variablen ausfüllen</div>' +
      vars.map(v => `
        <div>
          <label class="block text-xs text-gray-400 mb-1">[${v}]</label>
          <input type="text" data-var="${v}" placeholder="..." class="w-full p-2 rounded-lg text-sm" oninput="updatePreview()">
        </div>
      `).join('');
  }

  document.getElementById('includeHashtags').checked = false;
  updatePreview();
  document.getElementById('useModal').classList.remove('hidden');
}

function updatePreview() {
  if (!currentTemplate) return;
  let result = currentTemplate.text;
  document.querySelectorAll('#varInputs input[data-var]').forEach(input => {
    const v = input.dataset.var;
    const val = input.value || `[${v}]`;
    result = result.replaceAll(`[${v}]`, val);
  });
  if (document.getElementById('includeHashtags').checked) {
    const tags = HASHTAG_SETS[currentTemplate.pillar] || [];
    result += `\n\n.\n.\n.\n${tags.join(' ')}`;
  }
  document.getElementById('previewBox').textContent = result;
}

function closeUseModal() {
  document.getElementById('useModal').classList.add('hidden');
  currentTemplate = null;
}

async function copyPreview() {
  const text = document.getElementById('previewBox').textContent;
  try {
    await navigator.clipboard.writeText(text);
    showToast('✓ Caption kopiert');
    closeUseModal();
  } catch (e) {
    showToast('⚠️ Copy fehlgeschlagen');
  }
}

async function quickCopy(id) {
  const t = templates.find(x => x.id === id);
  if (!t) return;
  try {
    await navigator.clipboard.writeText(t.text);
    showToast('✓ Template kopiert');
  } catch (e) {
    showToast('⚠️ Copy fehlgeschlagen');
  }
}

async function copyHashtags(pillar) {
  const tags = HASHTAG_SETS[pillar];
  if (!tags) return;
  try {
    await navigator.clipboard.writeText(tags.join(' '));
    showToast(`✓ ${tags.length} Hashtags kopiert`);
  } catch (e) {
    showToast('⚠️ Copy fehlgeschlagen');
  }
}

// ============ CUSTOM TEMPLATES ============
function openAddModal() {
  editingId = null;
  document.getElementById('modalTitle').textContent = '➕ Eigenes Template';
  document.getElementById('tplText').value = '';
  document.getElementById('tplPillar').value = 'outdoor';
  document.getElementById('tplFunc').value = 'hook';
  document.getElementById('deleteBtn').classList.add('hidden');
  document.getElementById('addModal').classList.remove('hidden');
}

function editCustomTemplate(id) {
  const t = templates.find(x => x.id === id);
  if (!t || !t.custom) return;
  editingId = id;
  document.getElementById('modalTitle').textContent = '✏️ Template bearbeiten';
  document.getElementById('tplText').value = t.text;
  document.getElementById('tplPillar').value = t.pillar;
  document.getElementById('tplFunc').value = t.func;
  document.getElementById('deleteBtn').classList.remove('hidden');
  document.getElementById('addModal').classList.remove('hidden');
}

function closeAddModal() {
  document.getElementById('addModal').classList.add('hidden');
  editingId = null;
}

function saveCustomTemplate() {
  const text = document.getElementById('tplText').value.trim();
  if (!text) { showToast('⚠️ Text fehlt'); return; }

  const customs = SmashApp.getData('captionsCustom', []);
  const data = {
    text,
    pillar: document.getElementById('tplPillar').value,
    func: document.getElementById('tplFunc').value,
    custom: true
  };

  if (editingId) {
    const idx = customs.findIndex(c => c.id === editingId);
    if (idx >= 0) customs[idx] = { ...customs[idx], ...data };
    showToast('💾 Aktualisiert');
  } else {
    customs.push({ id: Date.now(), ...data });
    showToast('💾 Eigenes Template gespeichert');
  }

  SmashApp.setData('captionsCustom', customs);
  templates = [...SEED_TEMPLATES, ...customs];
  closeAddModal();
  render();
}

function deleteCustomTemplate() {
  if (!editingId) return;
  if (!confirm('Eigenes Template wirklich löschen?')) return;
  let customs = SmashApp.getData('captionsCustom', []);
  customs = customs.filter(c => c.id !== editingId);
  SmashApp.setData('captionsCustom', customs);
  templates = [...SEED_TEMPLATES, ...customs];
  closeAddModal();
  render();
  showToast('🗑️ Gelöscht');
}

// ============ TOAST ============
let toastTimer;
function showToast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  clearTimeout(toastTimer);
  toastTimer = setTimeout(() => t.classList.remove('show'), 1800);
}

// Modal-Backdrop close
document.getElementById('useModal').addEventListener('click', e => { if (e.target.id === 'useModal') closeUseModal(); });
document.getElementById('addModal').addEventListener('click', e => { if (e.target.id === 'addModal') closeAddModal(); });

init();
</script>
